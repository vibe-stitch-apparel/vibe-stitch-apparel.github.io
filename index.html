<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Stitch | Bespoke Tailoring & Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-900">

    <nav class="flex justify-between items-center p-6 bg-white">
        <img src="vibe-logo.png" alt="Vibe Stitch" class="h-12 w-auto">
        <a href="https://wa.me/234XXXXXXXXXX" class="text-xs font-bold uppercase tracking-widest border-b border-black">Book Consultation</a>
    </nav>

    <section class="relative h-[70vh] flex items-center justify-center overflow-hidden">
        <img src="fashion_studio.jpg" alt="Atelier" class="absolute inset-0 w-full h-full object-cover brightness-50">
        <div class="relative text-center text-white p-6">
            <h1 class="text-5xl font-serif italic mb-4">Precision in Every Stitch</h1>
            <p class="uppercase tracking-widest text-sm">Bespoke Apparel for the Modern Nigerian Aesthetic</p>
        </div>
    </section>

    <section class="max-w-6xl mx-auto py-16 px-4">
        <h2 class="text-center text-2xl font-serif mb-12 uppercase tracking-widest underline decoration-stone-300 underline-offset-8">The Collection</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="group cursor-pointer">
                <img src="bridal_gown.jpg" alt="Bridal" class="w-full h-96 object-cover hover:opacity-90 transition">
                <p class="mt-4 font-bold text-sm uppercase">Bridal Couture</p>
            </div>
            <div class="group cursor-pointer">
                <img src="native_wear.jpg" alt="Native" class="w-full h-96 object-cover hover:opacity-90 transition">
                <p class="mt-4 font-bold text-sm uppercase">Contemporary Native</p>
            </div>
            <div class="group cursor-pointer">
                <img src="mens_suit.jpg" alt="Suits" class="w-full h-96 object-cover hover:opacity-90 transition">
                <p class="mt-4 font-bold text-sm uppercase">Tailored Suiting</p>
            </div>
        </div>
    </section>

    <footer class="bg-stone-900 text-stone-300 py-16 text-center">
        <h3 class="text-white text-xl mb-6">Ready to create your look?</h3>
        <a href="https://wa.me/234XXXXXXXXXX" class="bg-white text-black px-8 py-4 font-bold uppercase text-sm hover:bg-stone-200 transition">Contact via WhatsApp</a>
        <p class="mt-12 text-xs uppercase tracking-widest">&copy; 2026 Vibe Stitch Apparel</p>
    </footer>

</body>
</html>
